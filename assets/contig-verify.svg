<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <style>
      .b   { font-size: 15px; }
      .lbl { fill: #8b949e; }
      .txt { fill: #e6edf3; }
      .grn { fill: #3fb950; }
      .yel { fill: #d29922; }
      .cyn { fill: #39c5cf; }
      .red { fill: #f85149; }
      .mut { fill: #6e7681; }
      .bold{ font-weight: 700; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="371" rx="12" fill="#0d1117" stroke="#30363d"/>
  <path d="M0 12 a12 12 0 0 1 12 -12 h856 a12 12 0 0 1 12 12 v32 h-880 z" fill="#161b22"/>
  <circle cx="24" cy="22" r="6" fill="#f85149"/>
  <circle cx="44" cy="22" r="6" fill="#d29922"/>
  <circle cx="64" cy="22" r="6" fill="#3fb950"/>
  <text x="440" y="27" text-anchor="middle" class="b mut">contig — the verdict is multi-layered</text>

  <g class="b">
    <text x="24" y="84"><tspan class="grn">$ </tspan><tspan class="txt">contig verify variant-demo --concordance-vcf bcftools.vcf.gz</tspan></text>

    <text x="24" y="120"><tspan class="grn">✓ </tspan><tspan class="lbl">qc            </tspan><tspan class="txt">every QC-metric threshold within range</tspan></text>
    <text x="24" y="150"><tspan class="grn">✓ </tspan><tspan class="lbl">structural    </tspan><tspan class="txt">outputs present · non-empty · index · gzip intact</tspan></text>
    <text x="24" y="180"><tspan class="grn">✓ </tspan><tspan class="lbl">concordance   </tspan><tspan class="txt">genotype 99.2% vs bcftools — </tspan><tspan class="grn">corroborated</tspan></text>
    <text x="24" y="210"><tspan class="grn">✓ </tspan><tspan class="lbl">plausibility  </tspan><tspan class="txt">Ti/Tv 2.03 · het/hom 1.54 — in expected range</tspan></text>
    <text x="24" y="240"><tspan class="grn">✓ </tspan><tspan class="lbl">integrity     </tspan><tspan class="txt">re-hashed outputs match record — </tspan><tspan class="grn">no drift</tspan></text>

    <rect x="24" y="274" width="78" height="30" rx="6" fill="#196c2e"/>
    <text x="63" y="295" text-anchor="middle" class="b bold grn">PASS</text>
    <text x="116" y="295"><tspan class="txt">verified · </tspan><tspan class="lbl">corroborated by a 2nd tool · scoped honestly per assay</tspan></text>

    <text x="24" y="340"><tspan class="grn">$ </tspan><tspan class="mut">contig show variant-demo --explain   # names the checks that drove it</tspan></text>
  </g>
</svg>
