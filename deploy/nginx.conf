# Nginx reverse proxy for the Contig dashboard (an alternative to deploy/Caddyfile).
#
# Unlike Caddy, nginx does NOT obtain TLS certificates for you. Point
# ssl_certificate and ssl_certificate_key at certificates you manage yourself
# (for example via certbot, or your cloud load balancer's certificate). The
# dashboard container listens on plain HTTP on :3000; nginx terminates TLS and
# forwards to it.
#
# Replace dashboard.example.com and the certificate paths with your real values.

# Redirect plain HTTP to HTTPS so callers always land on the secure endpoint.
server {
	listen 80;
	server_name dashboard.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	server_name dashboard.example.com;

	ssl_certificate     /etc/nginx/certs/fullchain.pem;
	ssl_certificate_key /etc/nginx/certs/privkey.pem;

	# Security response headers. HSTS keeps browsers on https; the rest reduce
	# clickjacking and content-type sniffing.
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	location / {
		# In docker-compose the hostname "dashboard" resolves to that service;
		# on a bare host use http://127.0.0.1:3000 instead.
		proxy_pass http://dashboard:3000;

		# Forward the original scheme and host so the app builds correct URLs and
		# the Auth0 callback and logout URLs line up with APP_BASE_URL.
		proxy_set_header Host              $host;
		proxy_set_header X-Real-IP         $remote_addr;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host  $host;

		# Next.js streams responses; disable response buffering so they flush
		# promptly to the client.
		proxy_buffering off;
	}
}
