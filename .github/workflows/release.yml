name: release

# Cut a release by pushing a version tag (e.g. v0.1.0) over git. This runs in the
# haqaliz/contig repo context with the repo GITHUB_TOKEN, so the GitHub Release and
# the GHCR image are owned by the repo, not by whatever account the local gh CLI is
# logged into. Each artifact attaches itself to the release as it finishes, so a slow
# or unavailable runner (the macOS Intel runners queue for a long time) never blocks
# the release: it publishes with what is ready and the rest trickle in. Channels:
# standalone binaries, PyPI (trusted publishing), a GHCR image, and a Homebrew tap
# (see RELEASING.md).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create the release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or update the release with notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  dist:
    name: Wheel and sdist
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

  binaries:
    name: Binary (${{ matrix.asset }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, asset: contig-linux-x86_64, sep: ":", ext: "" }
          - { os: macos-14, asset: contig-macos-arm64, sep: ":", ext: "" }
          - { os: windows-latest, asset: contig-windows-x86_64.exe, sep: ";", ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install contig and PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      - name: Build the binary
        shell: bash
        run: |
          pyinstaller --onefile --name contig \
            --collect-submodules contig \
            --copy-metadata contig \
            --add-data "src/contig/data${{ matrix.sep }}contig/data" \
            packaging/contig_main.py
          mv "dist/contig${{ matrix.ext }}" "dist/${{ matrix.asset }}"
      - name: Smoke test the binary
        shell: bash
        run: |
          "./dist/${{ matrix.asset }}" version
          "./dist/${{ matrix.asset }}" clusters --json > /dev/null
      - name: Attach the binary to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}

  binary-macos-intel:
    name: Binary (contig-macos-x86_64)
    needs: create-release
    # GitHub's macOS Intel (macos-13) runners queue indefinitely, so we build the
    # x86_64 binary on the plentiful Apple Silicon runner under Rosetta, using a
    # standalone x86_64 CPython (setup-python and uv only provide arm64 here). This
    # mirrors the local fallback in RELEASING.md. Independent job, so an Intel
    # failure never blocks the rest of the release.
    runs-on: macos-14
    env:
      # python-build-standalone release providing the x86_64-apple-darwin CPython.
      # Bump deliberately; the asset stays available, so the build env is pinned.
      PBS_TAG: "20260623"
      PBS_PY: "cpython-3.12.13+20260623-x86_64-apple-darwin-install_only.tar.gz"
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Rosetta is present
        run: softwareupdate --install-rosetta --agree-to-license || true
      - name: Build the x86_64 binary under Rosetta
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/py.tgz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/${PBS_PY}"
          mkdir -p /tmp/py-x64 && tar -xzf /tmp/py.tgz -C /tmp/py-x64
          arch -x86_64 /tmp/py-x64/python/bin/python3 -m venv /tmp/cx64
          arch -x86_64 /tmp/cx64/bin/python -m pip install --upgrade pip
          arch -x86_64 /tmp/cx64/bin/python -m pip install --only-binary=:all: cryptography pydantic typer
          arch -x86_64 /tmp/cx64/bin/python -m pip install --no-deps .
          arch -x86_64 /tmp/cx64/bin/python -m pip install pyinstaller
          arch -x86_64 /tmp/cx64/bin/pyinstaller --onefile --name contig \
            --collect-submodules contig \
            --copy-metadata contig \
            --add-data "src/contig/data:contig/data" \
            packaging/contig_main.py
          mv dist/contig dist/contig-macos-x86_64
      - name: Verify x86_64 and smoke test
        shell: bash
        run: |
          set -euo pipefail
          file dist/contig-macos-x86_64 | grep -q "x86_64"
          arch -x86_64 ./dist/contig-macos-x86_64 version
          arch -x86_64 ./dist/contig-macos-x86_64 clusters --json > /dev/null
      - name: Attach the binary to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/contig-macos-x86_64

  pypi:
    name: Publish to PyPI (trusted publishing)
    needs: create-release
    runs-on: ubuntu-latest
    # Requires a one-time PyPI trusted-publisher setup for this repo + workflow
    # (see RELEASING.md). Independent of the other jobs.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Publish the CLI image (GHCR and Docker Hub)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Docker Hub is optional: the steps that touch it only run when the
    # DOCKERHUB_USERNAME secret is set (see RELEASING.md). GHCR always runs.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Assemble image tags
        id: tags
        shell: bash
        run: |
          tags="ghcr.io/${{ github.repository }}:latest"$'\n'"ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            tags="${tags}"$'\n'"docker.io/${DOCKERHUB_USERNAME}/contig:latest"$'\n'"docker.io/${DOCKERHUB_USERNAME}/contig:${{ github.ref_name }}"
          fi
          {
            echo "list<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
